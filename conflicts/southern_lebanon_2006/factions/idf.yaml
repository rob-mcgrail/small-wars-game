name: "Israel Defense Forces"
side: enemy

# Night capabilities
night:
  spotting_modifier: 0.6
  accuracy_modifier: 0.7
  range_modifier: 0.8

# Fog of war: full_knowledge, satellite, approximate, total
fog_of_war: satellite
satellite_range: 6

# Command and control
c2:
  hq_transmission_base: 2
  hq_suppressed_multiplier: 2.5
  hq_mobile_multiplier: 1.3
  chain_intact_multiplier: 0.6
  los_transmission_time: 0.5

  planning_base: 2
  planning_multiplier:
    move: 1.0
    attack: 1.3
    patrol: 1.5
    ambush: 2.0
    withdraw: 0.8
    hold: 0.3
  planning_los_multiplier: 0.7
  planning_chain_multiplier: 0.7

  isolated_initiative: 0.3
  can_use_runners: false
  runner_minutes_per_hex: 4
  isolated_lockout_minutes: 15
  isolated_morale_penalty: 8

  warm_start_multiplier: 0.3
  countermand_multiplier: 1.3

  hq_switch_minutes: 8

# Default training/morale for this faction (can be overridden per unit)
defaults:
  training: regular
  morale: 60
  morale_recovery_per_min: 1.5
