    hex: [25, 28]
    assigned_hq: "Co HQ - Haris"

  - template: hzb_infantry
    name: "Fighter Squad 3"
    hex: [40, 22]
    assigned_hq: "Co HQ - Haris"

  - template: hzb_technical
    name: "Technical 1"
    hex: [28, 15]
    assigned_hq: "Co HQ - Haris"

  - template: hzb_technical
    name: "Technical 2"
    hex: [35, 18]
    assigned_hq: "Co HQ - Haris"

