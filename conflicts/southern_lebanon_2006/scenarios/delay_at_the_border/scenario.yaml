    name: "Bn HQ - Deir Mimas"
    hex: [30, 5]

  - template: hzb_shq
    name: "Co HQ - Haris"
    hex: [30, 12]
    assigned_hq: "Bn HQ - Deir Mimas"

  - template: hzb_atgm
    name: "Kornet Team 1"
    hex: [22, 22]
    assigned_hq: "Co HQ - Haris"

  - template: hzb_atgm
    name: "Kornet Team 2"
    hex: [38, 25]
