name: "Delay at the Border"
description: "July 2006. Delay the IDF advance to the Litani."
briefing: |
  Commander, Israeli armored forces are massing at the border.
  Intelligence indicates a battalion-strength push toward Bint Jbeil
  and the Litani crossing, beginning at nightfall.

  Your forces are positioned in the hills above the border.
  Use the terrain. Set ambushes. Delay their advance.

  They must not reach the Litani before noon tomorrow.

  You have the night on your side - they have thermal optics, but
  your fighters know every wadi and olive grove in these hills.

factions:
  player: hezbollah
  enemy: idf

# Town support: towns/cities that provide spotting for a faction
# spot_range in hexes (4km = 8 hexes at 500m/hex)
# Named locations on the map
map_labels:
  - hex: [20, 20]
    name: "Bint Jbeil"
  - hex: [30, 35]
    name: "Maroun al-Ras"
  - hex: [15, 17]
    name: "Aita ash-Shab"
  - hex: [45, 20]
    name: "Khiam"
  - hex: [30, 10]
    name: "Haris"
  - hex: [10, 28]
    name: "Aitaroun"
  - hex: [42, 30]
    name: "Taibe"
  - hex: [25, 38]
    name: "Yaroun"
  - hex: [50, 15]
    name: "Rab el-Thalathine"
  - hex: [8, 38]
    name: "Blida"
  - hex: [30, 3]
    name: "Deir Mimas"

town_support:
  - hex: [20, 20]
    faction: player
    spot_range: 8
    name: "Bint Jbeil"
  - hex: [30, 35]
    faction: player
    spot_range: 8
    name: "Maroun al-Ras"
  - hex: [15, 17]
    faction: player
    spot_range: 8
    name: "Aita ash-Shab"
  - hex: [45, 20]
    faction: player
    spot_range: 8
    name: "Khiam"
  - hex: [30, 10]
    faction: player
    spot_range: 8
    name: "Haris"

start_hour: 18
start_minute: 0
sunrise_hour: 5
sunset_hour: 20

victory:
  primary:
    type: hold_line
    row: 5
    unit_filter: armored
    until_hour: 12
    until_minute: 0
    description: "No enemy armor crosses the Litani line before 12:00 PM"

  bonus:
    - type: destroy_count
      side: enemy
      count: 4
      points: 50
      description: "Destroy 4 or more enemy vehicles"
    - type: destroy_count
      side: enemy
      count: 8
      points: 100
      description: "Destroy 8 or more enemy vehicles"
    - type: survive_all
      unit_filter: is_hq
      side: player
      points: 75
      description: "All HQ units survive"

  defeat:
    type: line_crossed
    row: 5
    unit_filter: armored
    side: enemy
    description: "Enemy armor has crossed the Litani line"

  time_limit_hours: 18

player_forces:
