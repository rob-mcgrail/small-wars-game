# Terrain type definitions
# code: single character used in map data files
# vehicle_speed: multiplier on vehicle road speed (1.0 = road speed)
# infantry_speed: multiplier on infantry speed (1.0 = full walking pace)
terrain_types:
  - name: open
    code: O
    color: "#c8d4a0"
    vehicle_speed: 0.6
    infantry_speed: 0.9

  - name: wooded
    code: W
    color: "#6b8e4e"
    vehicle_speed: 0.3
    infantry_speed: 0.8

  - name: river
    code: R
    color: "#4a80b4"
    vehicle_speed: 0.0
    infantry_speed: 0.3
    requires_amphibious: true

  - name: street
    code: S
    color: "#b0a890"
    vehicle_speed: 1.0
    infantry_speed: 1.0

  - name: town
    code: T
    color: "#c4a070"
    vehicle_speed: 0.5
    infantry_speed: 1.0

  - name: city
    code: C
    color: "#8c8c8c"
    vehicle_speed: 0.4
    infantry_speed: 1.0

# Elevation rendering
elevation:
  min_shade: -0.15
  max_shade: 0.15
