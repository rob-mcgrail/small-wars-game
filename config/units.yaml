# Unit type definitions
unit_types:
  - name: Technical
    code: TEC
    description: "Toyota Hilux pickup with mounted heavy weapon"
    icon_color: "#d4a44a"
    symbol: wheeled
    speed_kmh: 80
    amphibious: false


    # Crew and personnel
    crew: 4
    training: militia
    morale: 50
    # Morale recovery per minute when not under fire
    morale_recovery_per_min: 1.0

    # Protection
    armor: 0
    concealment: 2

    optics:
      name: "Eyesight"
      range_km: 1.5

    # Weapon systems
    # range_km: effective range when stationary
    # range_moving_km: effective range while moving (drive-by / suppression)
    weapons:
      - name: "DShK 12.7mm"
        type: hmg
        range_km: 1.5
        range_moving_km: 0.5
        # Suppressive range: will fire at this range but with heavy accuracy penalty
        suppressive_range_km: 2.0
        rate_of_fire: 600
        vs_soft: 8
        vs_armor: 1
        ammo: 500
        platform_accuracy: 0.3   # vehicle-mounted, bouncy, exposed gunner

      - name: "Rifles (crew)"
        type: rifle
        range_km: 0.5
        range_moving_km: 0.1
        # AKs will throw suppressive fire out to 800m
        suppressive_range_km: 0.8
        rate_of_fire: 100
        vs_soft: 3
        vs_armor: 0
        ammo: 360
        platform_accuracy: 0.7   # handheld, but firing from a vehicle

  - name: Battalion HQ
    code: BHQ
    description: "Toyota Hilux command vehicle with radios"
    icon_color: "#5a8a4a"
    symbol: wheeled
    speed_kmh: 70
    amphibious: false

    is_hq: true
    hq_level: 1

    crew: 3
    training: militia
    morale: 60
    morale_recovery_per_min: 1.5

    armor: 0
    concealment: 2

    optics:
      name: "Binoculars 10x50"
      range_km: 2.5

    comms:
      name: "Motorola HF Radio"
      range_km: 9.0

    weapons:
      - name: "Rifles (crew)"
        type: rifle
        range_km: 0.5
        range_moving_km: 0.1
        suppressive_range_km: 0.8
        rate_of_fire: 80
        vs_soft: 3
        vs_armor: 0
        ammo: 360
        platform_accuracy: 0.7

  - name: Company HQ
    code: SHQ
    description: "Toyota Hilux company command vehicle"
    icon_color: "#4a7a5a"
    symbol: wheeled
    speed_kmh: 70
    amphibious: false

    is_hq: true
    hq_level: 2

    crew: 3
    training: militia
    morale: 55
    morale_recovery_per_min: 1.2

    armor: 0
    concealment: 2

    optics:
      name: "Binoculars 7x50"
      range_km: 2.5

    comms:
      name: "Motorola VHF Radio"
      range_km: 6.0

    weapons:
      - name: "Rifles (crew)"
        type: rifle
        range_km: 0.5
        range_moving_km: 0.1
        suppressive_range_km: 0.8
        rate_of_fire: 80
        vs_soft: 3
        vs_armor: 0
        ammo: 360
        platform_accuracy: 0.7

  - name: Dismounted Crew
    code: INF
    description: "Dismounted vehicle crew on foot"
    icon_color: "#8a7a4a"
    symbol: infantry
    speed_kmh: 5
    amphibious: false


    crew: 4
    training: militia
    morale: 30
    morale_recovery_per_min: 0.5

    armor: 0
    # Very hard to spot/hit on foot, especially in cover
    concealment: 7

    optics:
      name: "Eyesight"
      range_km: 1.5

    weapons:
      - name: "Rifles"
        type: rifle
        range_km: 0.5
        range_moving_km: 0.2
        suppressive_range_km: 0.8
        rate_of_fire: 100
        vs_soft: 3
        vs_armor: 0
        ammo: 360
        platform_accuracy: 1.0

# Training levels: militia, irregular, regular, veteran, elite
# Morale: 1-100 (1 = will break immediately, 100 = fanatical)
# Armor: 0 = unarmored, 1-3 = light, 4-6 = medium, 7-10 = heavy
# Concealment: 0 = very visible, 1-3 = low, 4-6 = moderate, 7-10 = hard to spot
# vs_soft/vs_armor: effectiveness rating 0-10
