# Game flow configuration

# OODA loop: how often the player gets an orders phase
ooda:
  base_cycle_minutes: 15
  min_cycle_minutes: 5
  max_cycle_minutes: 45
  # Training modifier on base cycle (multiplied)
  training_modifier:
    militia: 1.5
    irregular: 1.2
    regular: 1.0
    veteran: 0.8
    elite: 0.6
  # Penalty multipliers (applied when condition is true)
  hq_moving_penalty: 1.5
  hq_suppressed_penalty: 2.0
  hq_destroyed_penalty: 3.0
  # Crew loss: per crew member lost from top HQ
  hq_crew_loss_penalty_per: 0.25

# Time settings
time:
  seconds_per_minute: 0.5
  start_hour: 6
  start_minute: 0
  sunrise_hour: 6
  sunset_hour: 19

# Night time penalties (applied to units without night_vision attribute)
night:
  ooda_penalty: 1.5
  spotting_range_modifier: 0.3
  accuracy_modifier: 0.4
  effective_range_modifier: 0.5

# Legacy order delays (sandbox mode only - scenarios use faction c2 configs)
# Kept as fallback defaults

staff_formulation:
  # Base time for HQ staff to process an order into executable form
  base_minutes: 10
  # Modifier per training level (multiplied by base)
  training_modifier:
    militia: 2.0
    irregular: 1.5
    regular: 1.0
    veteran: 0.75
    elite: 0.5
  # Penalty for changing an existing order mid-execution (multiplied by base)
  countermand_penalty: 1.5
  # Warm start: discount when issuing same order type as current/previous
  # e.g. move -> move with same posture = quick adjustment not a full replan
  warm_start_modifier: 0.4

unit_preparation:
  # Base time for a unit to prepare after receiving an order
  base_minutes: 5
  # Modifier per training level
  training_modifier:
    militia: 2.0
    irregular: 1.5
    regular: 1.0
    veteran: 0.7
    elite: 0.4
  # Modifier per order type
  order_modifier:
    move: 1.0
    attack: 1.5
    defend: 0.8
    withdraw: 1.2
    hold: 0.3
    patrol: 1.0
    ambush: 1.3

# Movement postures
# speed_modifier: multiplier on unit road speed
# detection_modifier: multiplier on how visible the unit is (higher = easier to spot)
# prep_modifier: multiplier on unit preparation time
postures:
  fast:
    speed_modifier: 1.0
    detection_modifier: 1.5
    prep_modifier: 0.8
    # Pathfinding: heavily favour roads, ignore cover
    road_preference: 3.0
    cover_preference: 0.0
  normal:
    speed_modifier: 0.7
    detection_modifier: 1.0
    prep_modifier: 1.0
    # Pathfinding: balanced
    road_preference: 1.5
    cover_preference: 0.5
  cautious:
    speed_modifier: 0.4
    detection_modifier: 0.5
    prep_modifier: 1.5
    # Pathfinding: favour cover (woods, towns), avoid open ground
    road_preference: 0.5
    cover_preference: 3.0

# HQ command hierarchy
hq:
  switching_cost_minutes: 15
  # Buff to order processing time when in comms with HQ
  comms_order_buff: 0.8
  # Buff when in LOS of HQ (replaces comms buff)
  los_order_buff: 0.6
  los_morale_buff: 20
  los_accuracy_buff: 1.2
  los_suppression_resistance: 0.85
  # OODA penalty when combat units report directly to top-level HQ
  # (bypassing company HQ layer - less efficient)
  direct_to_top_hq_ooda_penalty: 1.3
  # Time to switch HQ when auto-reassigning (minutes)
  auto_switch_minutes: 10

# Unit destruction effects
destruction:
  # Death marker duration in game minutes
  marker_duration_minutes: 120
  # Morale shock when a friendly unit is destroyed
  direct_hq_morale_shock: 15
  parent_hq_morale_shock: 8
  los_witness_morale_shock: 10
